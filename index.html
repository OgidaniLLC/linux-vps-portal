<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading VPS Portal | OgidaniLLC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); min-height: 100vh; }
        .card-glow { box-shadow: 0 0 40px rgba(59, 130, 246, 0.15), 0 25px 50px rgba(0,0,0,0.5); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3); }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .copy-btn:active { transform: scale(0.97); }
        #result-area { display: none; }
        #result-area.visible { display: block; }
    </style>
</head>
<body class="flex items-center justify-center p-6">
    <div class="w-full max-w-lg">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-lg">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Trading VPS Portal</h1>
            <p class="text-slate-400 mt-2 text-sm">OgidaniLLC — メンバー専用セットアップ</p>
        </div>

        <!-- Main Card -->
        <div class="bg-white rounded-3xl p-8 card-glow">
            <h2 class="text-lg font-semibold text-slate-700 mb-1">コマンド生成</h2>
            <p class="text-slate-400 text-sm mb-6">合言葉を入力してセットアップコマンドを発行してください。</p>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">今月の合言葉</label>
                    <input id="key" type="text" placeholder="例: TRADING202606"
                        class="w-full px-4 py-3 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-300 focus:outline-none focus:border-blue-400 input-focus transition-all duration-200">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">お名前 / 識別ID</label>
                    <input id="name" type="text" placeholder="例: 山田太郎"
                        class="w-full px-4 py-3 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-300 focus:outline-none focus:border-blue-400 input-focus transition-all duration-200">
                </div>
            </div>

            <button onclick="gen()"
                class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all duration-200 btn-glow text-sm tracking-wide">
                セットアップコマンドを生成する
            </button>

            <!-- Error Message -->
            <div id="error-msg" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm text-center font-medium"></div>

            <!-- Result Area -->
            <div id="result-area" class="mt-6">
                <div class="flex items-center justify-between mb-2">
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">生成されたコマンド</label>
                    <button onclick="copyCmd()" class="copy-btn flex items-center gap-1 text-xs text-blue-600 hover:text-blue-800 font-semibold transition-colors">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                        </svg>
                        <span id="copy-label">コピー</span>
                    </button>
                </div>
                <textarea id="res" readonly rows="5"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-xs text-slate-700 font-mono resize-none focus:outline-none"></textarea>
                <p class="text-xs text-slate-400 mt-2">※ VPSにSSHログイン後、上記コマンドを貼り付けて実行してください。</p>
                <p class="text-xs text-amber-500 mt-1">※ 日本語フォントが必要な場合は <strong>setup_vps.bat</strong> をご利用ください。</p>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-slate-500 text-xs mt-6">© 2026 OgidaniLLC — Professional Trading Solutions</p>
    </div>

    <script>
        function gen() {
            const k = document.getElementById('key').value.trim().toUpperCase();
            const n = document.getElementById('name').value.trim();
            const errEl = document.getElementById('error-msg');
            const resultArea = document.getElementById('result-area');

            errEl.classList.add('hidden');
            resultArea.classList.remove('visible');

            if (!n) {
                errEl.textContent = 'お名前 / 識別IDを入力してください。';
                errEl.classList.remove('hidden');
                return;
            }

            const now = new Date();
            const ok = "TRADING" + now.getFullYear() + (now.getMonth() + 1).toString().padStart(2, '0');

            if (k !== ok) {
                errEl.textContent = '合言葉が違います。担当者にお問い合わせください。';
                errEl.classList.remove('hidden');
                return;
            }

            const cmd = "sudo apt update && curl -fsSL https://get.docker.com | sh && mkdir -p trading-vps && cd trading-vps && curl -LO https://raw.githubusercontent.com/OgidaniLLC/linux-vps-portal/main/docker-compose.yml && docker compose up -d # ID:" + n;
            document.getElementById('res').value = cmd;
            resultArea.classList.add('visible');
        }

        function copyCmd() {
            const ta = document.getElementById('res');
            ta.select();
            navigator.clipboard.writeText(ta.value).then(() => {
                const lbl = document.getElementById('copy-label');
                lbl.textContent = 'コピー済み！';
                setTimeout(() => lbl.textContent = 'コピー', 2000);
            });
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') gen();
        });
    </script>
</body>
</html>
