<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading VPS Portal | OgidaniLLC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); min-height: 100vh; }
        .card-glow { box-shadow: 0 0 40px rgba(59, 130, 246, 0.15), 0 25px 50px rgba(0,0,0,0.5); }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="flex items-center justify-center p-6">
    <div class="w-full max-w-lg">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-lg">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Trading VPS Portal</h1>
            <p class="text-slate-400 mt-2 text-sm">OgidaniLLC — メンバー専用セットアップ</p>
        </div>

        <!-- Main Card -->
        <div class="bg-white rounded-3xl p-8 card-glow text-center">
            <h2 class="text-lg font-semibold text-slate-700 mb-2">セットアップツール</h2>
            <p class="text-slate-400 text-sm mb-8">以下のボタンからセットアップツールをダウンロードしてください。</p>

            <a href="https://raw.githubusercontent.com/OgidaniLLC/linux-vps-portal/main/setup_vps.bat"
                download="setup_vps.bat"
                class="inline-block w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all duration-200 btn-glow text-sm tracking-wide">
                setup_vps.bat をダウンロード
            </a>

            <p class="text-xs text-slate-400 mt-4">リンクを<strong>右クリック →「名前を付けてリンク先を保存」</strong>でダウンロードしてください。</p>
            <p class="text-xs text-slate-400 mt-1">ダウンロード後、右クリック →「管理者として実行」してください。</p>
            <p class="text-xs text-slate-400 mt-2">詳しい手順は <a href="https://github.com/OgidaniLLC/linux-vps-portal#readme" target="_blank" class="text-blue-400 hover:text-blue-600">セットアップガイド</a> を参照してください。</p>
        </div>

        <!-- Footer -->
        <div class="text-center mt-6">
            <p class="text-slate-600 text-xs">© 2026 OgidaniLLC — Professional Trading Solutions</p>
        </div>
    </div>
</body>
</html>
